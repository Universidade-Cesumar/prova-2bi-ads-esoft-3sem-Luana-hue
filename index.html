<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Controle de Almoxarifado</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <h1>Controle de Almoxarifado</h1>



        <div class="formulario">
            <input type="text" id="input-nome" placeholder="Nome do Material">

            <input type="number" id="input-quantidade" placeholder="Quantidade">

            <button id="btn-cadastrar">
                Cadastrar
            </button>
        </div>

        
        

        <h2>Materiais Cadastrados</h2>

        <h3>
    Total de materiais:
    <span id="total-items">0</span>
</h3>

        <input
    type="text"
    id="input-busca"
    placeholder="Pesquisar material..."
>

        <ul id="lista-materiais"></ul>

    </div>

    <script src="main.js"></script>
</body>
